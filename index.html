<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Developer Portfolio</title>
    <style>
        /* Previous CSS remains the same until projects-grid */
        
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .project-card {
            position: relative;
            cursor: pointer;
        }

        .project-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            overflow-y: auto;
            padding: 2rem;
        }

        .modal-content {
            background: white;
            max-width: 800px;
            margin: 2rem auto;
            padding: 2rem;
            border-radius: 8px;
            position: relative;
        }

        .close-modal {
            position: absolute;
            right: 1rem;
            top: 1rem;
            font-size: 1.5rem;
            cursor: pointer;
            background: none;
            border: none;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin: 1rem 0;
        }

        .gallery img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 4px;
            cursor: pointer;
        }

        .demo-video {
            width: 100%;
            aspect-ratio: 16/9;
            margin: 1rem 0;
        }

        .skills-section {
            background: white;
            padding: 2rem;
            border-radius: 8px;
            margin: 2rem 0;
        }

        .skills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
        }

        .skill-card {
            background: var(--bg);
            padding: 1rem;
            border-radius: 4px;
            text-align: center;
        }

        .skill-level {
            width: 100%;
            height: 8px;
            background: #e5e7eb;
            border-radius: 4px;
            margin-top: 0.5rem;
        }

        .skill-fill {
            height: 100%;
            background: var(--secondary);
            border-radius: 4px;
        }

        .game-jam {
            background: white;
            padding: 1.5rem;
            border-radius: 8px;
            margin-bottom: 1rem;
        }

        .achievements {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1rem;
            margin: 2rem 0;
        }

        .achievement-card {
            background: var(--primary);
            color: var(--text);
            padding: 1.5rem;
            border-radius: 8px;
            text-align: center;
        }

        .download-section {
            text-align: center;
            margin: 2rem 0;
        }

        .download-button {
            background: var(--secondary);
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 4px;
            text-decoration: none;
            display: inline-block;
            margin: 0.5rem;
        }

        .testimonials {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            margin: 2rem 0;
        }

        .testimonial {
            background: white;
            padding: 1.5rem;
            border-radius: 8px;
            position: relative;
        }

        .testimonial::before {
            content: '"';
            font-size: 4rem;
            position: absolute;
            top: -1rem;
            left: 1rem;
            color: #e5e7eb;
        }

        /* Add previous CSS here */
    </style>
</head>
<body>
    <!-- Previous nav and hero sections remain the same -->

    <section class="container">
        <h2 class="section-title">Skills & Technologies</h2>
        <div class="skills-section">
            <div class="skills-grid" id="skills-container">
                <!-- Skills will be added by JavaScript -->
            </div>
        </div>
    </section>

    <section id="projects" class="container">
        <h2 class="section-title">Game Projects</h2>
        <div class="projects-grid" id="projects-container">
            <!-- Projects will be added by JavaScript -->
        </div>
    </section>

    <section class="container">
        <h2 class="section-title">Game Jams & Competitions</h2>
        <div id="jams-container">
            <!-- Game jams will be added by JavaScript -->
        </div>
    </section>

    <section class="container">
        <h2 class="section-title">Achievements</h2>
        <div class="achievements" id="achievements-container">
            <!-- Achievements will be added by JavaScript -->
        </div>
    </section>

    <section class="container">
        <h2 class="section-title">Testimonials</h2>
        <div class="testimonials" id="testimonials-container">
            <!-- Testimonials will be added by JavaScript -->
        </div>
    </section>

    <section class="container">
        <h2 class="section-title">Downloads & Resources</h2>
        <div class="download-section">
            <a href="#" class="download-button">Download Resume</a>
            <a href="#" class="download-button">Game Design Document Template</a>
            <a href="#" class="download-button">Unity Asset Package</a>
        </div>
    </section>

    <!-- Previous blog and contact sections remain the same -->

    <script>
        // Previous mobile menu code remains the same

        const skills = [
            { name: "Unity", level: 90, category: "Game Engines" },
            { name: "Unreal Engine", level: 75, category: "Game Engines" },
            { name: "C#", level: 85, category: "Programming" },
            { name: "C++", level: 70, category: "Programming" },
            { name: "3D Modeling", level: 65, category: "Art" },
            { name: "Game Design", level: 80, category: "Design" }
        ];

        const projects = [
            {
                title: "Space Explorer",
                description: "A 2D space exploration game with procedural galaxy generation",
                shortDescription: "Procedural space exploration game",
                image: "/api/placeholder/400/300",
                gallery: ["/api/placeholder/400/300", "/api/placeholder/400/300"],
                video: "demo-video-url",
                tags: ["Unity", "C#", "Procedural Generation"],
                link: "#",
                features: [
                    "Procedurally generated galaxies",
                    "Dynamic combat system",
                    "Resource management"
                ],
                platforms: ["Steam", "itch.io"],
                downloads: 15000,
                rating: 4.5
            },
            // Add more projects...
        ];

        const gameJams = [
            {
                name: "Global Game Jam 2025",
                project: "Time Loop Puzzle",
                placement: "1st Place",
                description: "Created a puzzle game based on time manipulation mechanics in 48 hours",
                link: "#"
            },
            // Add more game jams...
        ];

        const achievements = [
            {
                title: "1M+ Downloads",
                description: "Across all published games"
            },
            {
                title: "Featured on Steam",
                description: "Space Explorer featured on Steam front page"
            },
            // Add more achievements...
        ];

        const testimonials = [
            {
                text: "An exceptional game developer with great attention to detail",
                author: "John Doe",
                role: "Lead Developer, Game Studio"
            },
            // Add more testimonials...
        ];

        // Render skills
        const skillsContainer = document.getElementById('skills-container');
        skills.forEach(skill => {
            const skillElement = document.createElement('div');
            skillElement.className = 'skill-card';
            skillElement.innerHTML = `
                <h3>${skill.name}</h3>
                <div class="skill-level">
                    <div class="skill-fill" style="width: ${skill.level}%"></div>
                </div>
                <p>${skill.category}</p>
            `;
            skillsContainer.appendChild(skillElement);
        });

        // Render projects with modals
        const projectsContainer = document.getElementById('projects-container');
        projects.forEach(project => {
            const projectElement = document.createElement('div');
            projectElement.className = 'project-card';
            projectElement.innerHTML = `
                <img src="${project.image}" alt="${project.title}">
                <div class="project-content">
                    <h3>${project.title}</h3>
                    <p>${project.shortDescription}</p>
                    <div class="tags">
                        ${project.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
                    </div>
                </div>
            `;

            const modalElement = document.createElement('div');
            modalElement.className = 'project-modal';
            modalElement.innerHTML = `
                <div class="modal-content">
                    <button class="close-modal">×</button>
                    <h2>${project.title}</h2>
                    <p>${project.description}</p>
                    <div class="gallery">
                        ${project.gallery.map(img => `<img src="${img}" alt="Screenshot">`).join('')}
                    </div>
                    <iframe class="demo-video" src="${project.video}" frameborder="0" allowfullscreen></iframe>
                    <h3>Features</h3>
                    <ul>
                        ${project.features.map(feature => `<li>${feature}</li>`).join('')}
                    </ul>
                    <p>Available on: ${project.platforms.join(', ')}</p>
                    <p>Downloads: ${project.downloads.toLocaleString()}</p>
                    <p>Rating: ${project.rating}/5</p>
                </div>
            `;

            projectElement.addEventListener('click', () => {
                modalElement.style.display = 'block';
            });

            modalElement.querySelector('.close-modal').addEventListener('click', () => {
                modalElement.style.display = 'none';
            });

            document.body.appendChild(modalElement);
            projectsContainer.appendChild(projectElement);
        });

        // Render game jams
        const jamsContainer = document.getElementById('jams-container');
        gameJams.forEach(jam => {
            const jamElement = document.createElement('div');
            jamElement.className = 'game-jam';
            jamElement.innerHTML = `
                <h3>${jam.name}</h3>
                <p><strong>${jam.project}</strong> - ${jam.placement}</p>
                <p>${jam.description}</p>
                <a href="${jam.link}">View Project →</a>
            `;
            jamsContainer.appendChild(jamElement);
        });

        // Render achievements
        const achievementsContainer = document.getElementById('achievements-container');
        achievements.forEach(achievement => {
            const achievementElement = document.createElement('div');
            achievementElement.className = 'achievement-card';
            achievementElement.innerHTML = `
                <h3>${achievement.title}</h3>
                <p>${achievement.description}</p>
            `;
            achievementsContainer.appendChild(achievementElement);
        });

        // Render testimonials
        const testimonialsContainer = document.getElementById('testimonials-container');
        testimonials.forEach(testimonial => {
            const testimonialElement = document.createElement('div');
            testimonialElement.className = 'testimonial';
            testimonialElement.innerHTML = `
                <p>${testimonial.text}</p>
                <p><strong>${testimonial.author}</strong></p>
                <p>${testimonial.role}</p>
            `;
            testimonialsContainer.appendChild(testimonialElement);
        });
    </script>
</body>
</html>
